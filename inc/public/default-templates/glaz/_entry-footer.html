<!-- # html structure
# ----------------------------
# footer.post-meta
#   p.post-info
#      span.post-author
#      span.post-date
#   div.post-taxonomy
#      p.post-cat
#      ul.post-tags-list
#   p.post-info-co
---------------------------->
<tpl:Block name="_entry-footer-content">
<footer class="post-meta">
  <tpl:Block name="_entry-footer-post-info">
    <p class="post-info">
      <span class="post-author">{{tpl:lang By}} {{tpl:EntryAuthorLink}}, </span>
      <span class="post-date"><time datetime="{{tpl:EntryDate iso8601="1"}}">{{tpl:EntryDate}}</time></span>
    </p>
  </tpl:Block><!-- #end block entry-footer-post-info -->
  <tpl:Block name="_entry-footer-post-taxonomy">
    <tpl:EntryIf has_category="1" operator="or" has_tags="1">
      <div class="post-taxonomy">
        <tpl:EntryIf has_category="1">
          <p class="post-cat"><tpl:EntryCategoriesBreadcrumb><a href="{{tpl:CategoryURL}}">{{tpl:CategoryTitle encode_html="1"}}</a> › </tpl:EntryCategoriesBreadcrumb><a href="{{tpl:EntryCategoryURL}}">{{tpl:EntryCategory encode_html="1"}}</a></p>
        </tpl:EntryIf>
        <tpl:Block name="_entry-footer-post-tags">
          <tpl:EntryTags>
            <tpl:TagsHeader>
              <ul class="post-tags-list">
            </tpl:TagsHeader>
              <li class="post-tags-item"><a href="{{tpl:TagURL}}">{{tpl:TagID}}</a></li>
            <tpl:TagsFooter>
              </ul>
            </tpl:TagsFooter>
          </tpl:EntryTags>
        </tpl:Block><!-- #end block entry-footer-post-tags -->
      </div><!-- # end div.taxonomy -->
    </tpl:EntryIf><!-- #end if has tags or category-->
  </tpl:Block><!-- #end block entry-footer-post-taxonomy -->
  <tpl:Block name="_entry-footer-counters">
    <!-- # Number of comments, trackbacks and attachments -->
    <tpl:EntryIf operator="or" show_comments="1" show_pings="1" has_attachment="1">
      <p class="post-info-co post-info-more">
        <tpl:EntryIf show_comments="1">
          <a href="{{tpl:EntryURL}}#comments" class="comment_count">{{tpl:EntryCommentCount}}</a>
        </tpl:EntryIf>
        <tpl:EntryIf show_pings="1">
          <a href="{{tpl:EntryURL}}#pings" class="ping_count">{{tpl:EntryPingCount}}</a></tpl:EntryIf>
      </p>
    </tpl:EntryIf>
  </tpl:Block><!-- #end block entry-footer-counters -->
</footer>
</tpl:Block>
