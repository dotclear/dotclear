<tpl:Pagination>
  <p class="pagination">
    <tpl:PaginationIf end="0">
      <a href="{{tpl:PaginationURL offset="+1"}}" class="prev">&#171; {{tpl:lang previous entries}}</a><span class="pagination-separator-before"> - </span>   </tpl:PaginationIf>

    {{tpl:lang page}} {{tpl:PaginationCurrent}} {{tpl:lang of}} {{tpl:PaginationCounter}}

    <tpl:PaginationIf start="0"><span class="pagination-separator-after"> - </span><a href="{{tpl:PaginationURL offset="-1"}}" class="next">
      {{tpl:lang next entries}} &#187;</a>
    </tpl:PaginationIf>
  </p>
</tpl:Pagination>
